services:
  # MINIO: Your "S3" Storage
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cad-network

  # SPARK MASTER
  spark-master:
    build: .
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/data
    networks:
      - cad-network

  # SPARK WORKER
  spark-worker:
    build: .
    # Scale this up later if you want more workers!
    depends_on:
      spark-master:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      # Pass these so boto3 can find them if you use env-based config
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_ENDPOINT_URL=http://minio:9000
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/data
    networks:
      - cad-network

  # AIRFLOW
  airflow:
    image: apache/airflow:2.7.1
    container_name: airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      # Install Python packages needed by DAGs
      - _PIP_ADDITIONAL_REQUIREMENTS=boto3 requests
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: standalone
    networks:
      - cad-network

  # POSTGRES
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cad-network

  # SUPERSET UI
  superset:
    image: apache/superset:4.0.1
    container_name: superset
    user: root
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=TEST_SECRET_KEY_12345
      - SUPERSET_SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - PYTHONPATH=/app/pythonpath
    depends_on:
      - postgres
    command: >
      bash -c "pip install psycopg2-binary pyhive thrift &&
               superset db upgrade && 
               superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@superset.com --password admin && 
               superset init && 
               gunicorn -w 2 --timeout 120 -b 0.0.0.0:8088 --limit-request-line 0 --limit-request-field_size 0 'superset.app:create_app()'"
    networks:
      - cad-network

networks:
  cad-network:
    driver: bridge

volumes:
  minio_data:
  postgres_data: